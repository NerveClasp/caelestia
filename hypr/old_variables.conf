# ### Hyprland ###
$mainMod = Alt
$altMod = Super
# Apps
$terminal = wezterm
$browser = zen-browser
$editor = codium
$fileExplorer = nemo

# Touchpad
$touchpadDisableTyping = true
$touchpadScrollFactor = 0.3
$workspaceSwipeFingers = 4
$gestureFingers = 3
$gestureFingersMore = 4

# Blur
$blurEnabled = true
$blurSpecialWs = false
$blurPopups = true
$blurInputMethods = true
$blurSize = 8
$blurPasses = 2
$blurXray = false

# Shadow
$shadowEnabled = true
$shadowRange = 20
$shadowRenderPower = 3
$shadowColour = rgba($surfaced4)

# Gaps
$workspaceGaps = 5
$windowGapsIn = 5
$windowGapsOut = 10
$singleWindowGapsOut = 2
