exec = hyprctl dispatch submap global
submap = global

# ## Shell keybinds
# Launcher
bindi = Super, Super_L, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt
bindin = Super, mouse:273, global, caelestia:launcherInterrupt
bindin = Super, mouse:274, global, caelestia:launcherInterrupt
bindin = Super, mouse:275, global, caelestia:launcherInterrupt
bindin = Super, mouse:276, global, caelestia:launcherInterrupt
bindin = Super, mouse:277, global, caelestia:launcherInterrupt
bindin = Super, mouse_up, global, caelestia:launcherInterrupt
bindin = Super, mouse_down, global, caelestia:launcherInterrupt

# Misc
bind = $kbSession, global, caelestia:session
bind = $kbShowSidebar, global, caelestia:sidebar
bindl = $kbClearNotifs, global, caelestia:clearNotifs
bind = $kbShowPanels, global, caelestia:showall
bind = $kbLock, global, caelestia:lock
bind = Super+Shift, W, exec, caelestia wallpaper -r $wallpapersFolder

# Restore lock
bindl = $kbRestoreLock, exec, caelestia shell -d
bindl = $kbRestoreLock, global, caelestia:lock

# Brightness
bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# Media
bindl = Ctrl+Super, Space, global, caelestia:mediaToggle
bindl = , XF86AudioPlay, global, caelestia:mediaToggle
bindl = , XF86AudioPause, global, caelestia:mediaToggle
bindl = Ctrl+Super, Equal, global, caelestia:mediaNext
bindl = , XF86AudioNext, global, caelestia:mediaNext
bindl = Ctrl+Super, Minus, global, caelestia:mediaPrev
bindl = , XF86AudioPrev, global, caelestia:mediaPrev
bindl = , XF86AudioStop, global, caelestia:mediaStop

# Kill/restart
bindr = Ctrl+Super+Shift, R, exec, qs -c caelestia kill
bindr = Ctrl+Super+Alt, R, exec, qs -c caelestia kill; sleep .1; caelestia shell -d

# plugin {
#     hyprsplit {
#         num_workspaces = 6
#     }
# }
# Go to workspace #
$wsaction = ~/.config/hypr/scripts/wsaction.fish
$wspace = workspace
# $wspace = split:workspace

bind = $kbGoToWs, 1, exec, $wsaction $wspace 1
bind = $kbGoToWs, 2, exec, $wsaction $wspace 2
bind = $kbGoToWs, 3, exec, $wsaction $wspace 3
bind = $kbGoToWs, 4, exec, $wsaction $wspace 4
bind = $kbGoToWs, 5, exec, $wsaction $wspace 5
bind = $kbGoToWs, 6, exec, $wsaction $wspace 6
bind = $kbGoToWs, 7, exec, $wsaction $wspace 7
bind = $kbGoToWs, 8, exec, $wsaction $wspace 8
bind = $kbGoToWs, 9, exec, $wsaction $wspace 9
bind = $kbGoToWs, 0, exec, $wsaction $wspace 10
# Go to $wspace group #
bind = $kbGoToWsGroup, 1, exec, $wsaction -g $wspace 1
bind = $kbGoToWsGroup, 2, exec, $wsaction -g $wspace 2
bind = $kbGoToWsGroup, 3, exec, $wsaction -g $wspace 3
bind = $kbGoToWsGroup, 4, exec, $wsaction -g $wspace 4
bind = $kbGoToWsGroup, 5, exec, $wsaction -g $wspace 5
bind = $kbGoToWsGroup, 6, exec, $wsaction -g $wspace 6
bind = $kbGoToWsGroup, 7, exec, $wsaction -g $wspace 7
bind = $kbGoToWsGroup, 8, exec, $wsaction -g $wspace 8
bind = $kbGoToWsGroup, 9, exec, $wsaction -g $wspace 9
bind = $kbGoToWsGroup, 0, exec, $wsaction -g $wspace 10
# Go to $wspace -1/+1
bind = Super, mouse_down, $wspace, -1
bind = Super, mouse_up, $wspace, +1
binde = $kbPrevWs, $wspace, -1
binde = $kbNextWs, $wspace, +1
binde = Super, Page_Up, $wspace, -1
binde = Super, Page_Down, $wspace, +1
# Go to $wspace group -1/+1
bind = Ctrl+Super, mouse_down, $wspace, -10
bind = Ctrl+Super, mouse_up, $wspace, +10
# Toggle special $wspace
bind = $kbToggleSpecialWs, exec, caelestia toggle specialws

$mv2wspace = movetoworkspace
# $mv2wspace = split:movetoworkspace

# Move window to workspace #
bind = $kbMoveWinToWs, 1, exec, $wsaction $mv2wspace 1
bind = $kbMoveWinToWs, 2, exec, $wsaction $mv2wspace 2
bind = $kbMoveWinToWs, 3, exec, $wsaction $mv2wspace 3
bind = $kbMoveWinToWs, 4, exec, $wsaction $mv2wspace 4
bind = $kbMoveWinToWs, 5, exec, $wsaction $mv2wspace 5
bind = $kbMoveWinToWs, 6, exec, $wsaction $mv2wspace 6
bind = $kbMoveWinToWs, 7, exec, $wsaction $mv2wspace 7
bind = $kbMoveWinToWs, 8, exec, $wsaction $mv2wspace 8
bind = $kbMoveWinToWs, 9, exec, $wsaction $mv2wspace 9
bind = $kbMoveWinToWs, 0, exec, $wsaction $mv2wspace 10
# Move window to workspace group #
bind = $kbMoveWinToWsGroup, 1, exec, $wsaction -g $mv2wspace 1
bind = $kbMoveWinToWsGroup, 2, exec, $wsaction -g $mv2wspace 2
bind = $kbMoveWinToWsGroup, 3, exec, $wsaction -g $mv2wspace 3
bind = $kbMoveWinToWsGroup, 4, exec, $wsaction -g $mv2wspace 4
bind = $kbMoveWinToWsGroup, 5, exec, $wsaction -g $mv2wspace 5
bind = $kbMoveWinToWsGroup, 6, exec, $wsaction -g $mv2wspace 6
bind = $kbMoveWinToWsGroup, 7, exec, $wsaction -g $mv2wspace 7
bind = $kbMoveWinToWsGroup, 8, exec, $wsaction -g $mv2wspace 8
bind = $kbMoveWinToWsGroup, 9, exec, $wsaction -g $mv2wspace 9
bind = $kbMoveWinToWsGroup, 0, exec, $wsaction -g $mv2wspace 10
# Move window to workspace -1/+1
binde = $kbMoveWinToWs, Page_Up, $mv2wspace, -1
binde = $kbMoveWinToWs, Page_Down, $mv2wspace, +1
bind = $kbMoveWinToWs, mouse_down, $mv2wspace, -1
bind = $kbMoveWinToWs, mouse_up, $mv2wspace, +1
binde = Ctrl+Super+Shift, right, $mv2wspace, +1
binde = Ctrl+Super+Shift, left, $mv2wspace, -1
# Move window to/from special workspace
bind = Ctrl+Super+Shift, up, $mv2wspace, special:special
bind = Ctrl+Super+Shift, down, $mv2wspace, e+0
bind = Super+Alt, S, $mv2wspace, special:special

# Window groups
binde = $kbWindowGroupCycleNext, cyclenext
binde = $kbWindowGroupCyclePrev, cyclenext, prev
binde = Ctrl+Alt, Tab, changegroupactive, f
binde = Ctrl+Shift+Alt, Tab, changegroupactive, b
bind = $kbToggleGroup, togglegroup
bind = $kbUngroup, moveoutofgroup
bind = Super+Shift, Comma, lockactivegroup, toggle

# Window actions
bind = Super, left, movefocus, l
bind = Super, right, movefocus, r
bind = Super, up, movefocus, u
bind = Super, down, movefocus, d
bind = Super+Shift, left, movewindow, l
bind = Super+Shift, right, movewindow, r
bind = Super+Shift, up, movewindow, u
bind = Super+Shift, down, movewindow, d
